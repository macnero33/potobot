<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photobooth Receipt — Himpunan DKV</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="photobooth-app">
  <header>
    <h1>📷 Photobooth Receipt — Himpunan DKV</h1>
    <span id="cam-status">Memuat kamera...</span>
  </header>

  <div class="konten-studio">
    <div id="left">
      <div id="cam-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div id="cam-overlay"></div>
        <div id="countdown-display"></div>
        <div id="flash"></div>
      </div>

      <div id="controls-bar">
        <button id="btn-shoot"><span id="shoot-text">Ambil Semua Foto (Spasi)</span></button>
        <button id="btn-download">Download JPG</button>
        <button id="btn-print">Print Struk</button>
        <button id="btn-reset">Reset Sesi</button>
      </div>

      <p id="status">Kamera siap. Tekan tombol atau spasi untuk mulai foto.</p>

      <div id="print-result">
        <h3>🎉 Pratinjau Struk Cetak:</h3>
        <div class="receipt-preview-box">
          <img id="print-img" src="" alt="Hasil photobooth receipt">
        </div>
        
        <div id="qr-wrap">
          <div class="qr-card">
            <div id="qrcode"></div>
            <div class="qr-text-side">
              <h4>Scan untuk Download</h4>
              <p id="qr-status-text">Mengunggah gambar ke cloud cloud...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="right">
      <div class="ctrl-section">
        <span class="ctrl-label">Pilih Kamera</span>
        <select id="cam-select"><option value="">Mendeteksi kamera...</option></select>
      </div>
      
      <div class="ctrl-section">
        <span class="ctrl-label">Layout Struk</span>
        <select id="layout-select">
          <option value="strip3">Strip 3 foto (Memanjang/Vertikal)</option>
          <option value="grid4">Grid 2×2 (4 foto)</option>
          <option value="single">Single foto</option>
        </select>
      </div>
      
      <div class="ctrl-section">
        <span class="ctrl-label">Template / Tema Struk</span>
        <select id="frame-select">
          <option value="builtin-light">Struk Kasir Standar (Hitam-Putih)</option>
          <option value="calendar-2026">📅 Edisi Khusus: Kalender Juni 2026</option>
        </select>
      </div>
      
      <div class="ctrl-section">
        <span class="ctrl-label">Countdown Timer</span>
        <select id="timer-select">
          <option value="3">3 detik</option>
          <option value="5">5 detik</option>
          <option value="0">Tanpa timer</option>
        </select>
      </div>
      
      <div class="ctrl-section">
        <span class="ctrl-label">Pratinjau Slot Jepretan</span>
        <div id="strip-preview"></div>
      </div>
    </div>
  </div>

  <canvas id="result-canvas" style="display: none;"></canvas>
  <canvas id="shot-canvas" style="display: none;"></canvas>
  <iframe id="print-iframe" style="display: none;"></iframe>
</div>

<script src="script.js"></script>
</body>
</html>
